<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | Visual Diary</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-blur: rgba(255, 255, 255, 0.8);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(37, 99, 235, 0.1), rgba(37, 99, 235, 0.1)), 
                        url('https://img.freepik.com/free-vector/paper-style-dynamic-lines-background_23-2149008629.jpg?w=740');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .auth-container {
            background: var(--bg-blur);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            color: #1e293b;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: rgba(255,255,255,0.5);
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .toggle-text span {
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 600;
        }
        /* ===== MESSAGE BOX UI ===== */
.msg-box {
    display: none;
    padding: 12px 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: left;
    animation: fadeMsg 0.4s ease;
}

/* Success */
.msg-success {
    background: #dcfce7;
    color: #166534;
    border-left: 4px solid #22c55e;
}

/* Error */
.msg-error {
    background: #fee2e2;
    color: #991b1b;
    border-left: 4px solid #ef4444;
}

/* Animation */
@keyframes fadeMsg {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}

        #register-form { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div id="login-form">
            <h2>Welcome Back</h2>
            <div id="login-msg" class="msg-box"></div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <button class="btn" id="loginBtn">Login</button>
            <p class="toggle-text">Don't have an account? <span onclick="toggleAuth()">Register</span></p>
        </div>

        <div id="register-form">
            <h2>Create Account</h2>
            <div id="reg-msg" class="msg-box"></div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-pass" placeholder="••••••••">
            </div>
            <button class="btn" id="regBtn">Sign Up</button>
            <p class="toggle-text">Already have an account? <span onclick="toggleAuth()">Login</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB0c89IeqVrz8aJ9BMX6eLQh6tmrLwdD_E",
            authDomain: "myweb-336bd.firebaseapp.com",
            projectId: "myweb-336bd",
            storageBucket: "myweb-336bd.firebasestorage.app",
            messagingSenderId: "720945527691",
            appId: "1:720945527691:web:865c08bf46f7562963cd8e"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        /* ===== LOGIN ===== */
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
        
            if (!email || !pass) {
                showMessage("login-msg", "Please fill all fields", "error");
                return;
            }
        
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    showMessage("login-msg", "Login successful!", "success");
        
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                })
                .catch((error) => {
                    handleAuthError(error.code, "login-msg");
                });
        });
        
        /* ===== REGISTER ===== */
        document.getElementById('regBtn').addEventListener('click', () => {
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
        
            if (!email || !pass) {
                showMessage("reg-msg", "Please fill all fields", "error");
                return;
            }
        
            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    showMessage("reg-msg", "Registration successful! Please login.", "success");
        
                    // Switch to login instead of reload
                    setTimeout(() => {
                        toggleAuth();
                    }, 1500);
                })
                .catch((error) => {
                    handleAuthError(error.code, "reg-msg");
                });
        });
        
        /* ===== ERROR HANDLER ===== */
        function handleAuthError(code, boxId) {
            let message = "";
        
            switch (code) {
                case "auth/invalid-credential":
                    message = "Email or password incorrect";
                    break;
                case "auth/user-not-found":
                    message = "Account not found";
                    break;
                case "auth/wrong-password":
                    message = "Wrong password";
                    break;
                case "auth/email-already-in-use":
                    message = "Email already registered";
                    break;
                case "auth/weak-password":
                    message = "Password must be at least 6 characters";
                    break;
                case "auth/invalid-email":
                    message = "Invalid email format";
                    break;
                default:
                    message = "Something went wrong. Try again";
            }
        
            showMessage(boxId, message, "error");
        }
        
        /* ===== MESSAGE UI ===== */
        function showMessage(id, message, type) {
            const box = document.getElementById(id);
            box.style.display = "block";
            box.className = "msg-box " + (type === "success" ? "msg-success" : "msg-error");
            box.innerText = message;
        
            setTimeout(() => {
                box.style.display = "none";
            }, 4000);
        }
        </script>

    
</body>
</html>
